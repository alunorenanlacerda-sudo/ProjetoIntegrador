    <script>
        var modalLogin = document.getElementById("loginModal");
        var btnLogin = document.getElementById("loginBtn");
        var closeLogin = document.getElementById("closeLogin");

        // 1. Faz o botão do cabeçalho ABRIR a janela
        if(btnLogin && modalLogin) {
            btnLogin.onclick = function(event) {
                event.preventDefault(); // Impede a tela de pular para o topo
                modalLogin.style.display = "flex";
            }
        }

        // 2. Faz o "X" FECHAR a janela
        if(closeLogin && modalLogin) {
            closeLogin.onclick = function() {
                modalLogin.style.display = "none";
            }
        }

        // 3. FECHA a janela se o usuário clicar fora da caixa escura
        window.onclick = function(event) {
            if (event.target == modalLogin) {
                modalLogin.style.display = "none";
            }
        }
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Procura pelos campos de CPF nas diferentes páginas
            const cpfInputs = document.querySelectorAll('#cpf, #cpf_dono');

            cpfInputs.forEach(function(input) {
                
                // 1. Aplica a máscara (pontos e traço) enquanto o utilizador digita
                input.addEventListener('input', function(e) {
                    let value = e.target.value.replace(/\D/g, ''); // Remove tudo o que não é número
                    if (value.length > 11) value = value.slice(0, 11); // Limita a 11 números
                    
                    // Coloca a formatação 000.000.000-00
                    value = value.replace(/(\d{3})(\d)/, '$1.$2');
                    value = value.replace(/(\d{3})(\d)/, '$1.$2');
                    value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    
                    e.target.value = value;
                });

                // 2. Valida matematicamente o CPF quando o utilizador sai do campo
                input.addEventListener('blur', function(e) {
                    let valor = e.target.value;
                    if (valor.length > 0) {
                        let cpfValido = validarCPF(valor);
                        if (!cpfValido) {
                            alert('Por favor, introduza um CPF válido.');
                            e.target.value = ''; // Limpa o campo errado
                            e.target.focus();    // Mantém o cursor no campo
                        }
                    }
                });
            });

            // ==========================================
            // FUNÇÃO MATEMÁTICA QUE VERIFICA O CPF
            // ==========================================
            function validarCPF(cpf) {
                cpf = cpf.replace(/[^\d]+/g,''); // Retira a máscara para validar
                
                if(cpf == '') return false;
                
                // Elimina CPFs falsos mais conhecidos ou com tamanho errado
                if (cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false;

                // Valida o 1º dígito verificador
                let add = 0;
                for (let i=0; i < 9; i ++) add += parseInt(cpf.charAt(i)) * (10 - i);
                let rev = 11 - (add % 11);
                if (rev == 10 || rev == 11) rev = 0;
                if (rev != parseInt(cpf.charAt(9))) return false;

                // Valida o 2º dígito verificador
                add = 0;
                for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i);
                rev = 11 - (add % 11);
                if (rev == 10 || rev == 11) rev = 0;
                if (rev != parseInt(cpf.charAt(10))) return false;

                return true; // Se passar por tudo, o CPF é verdadeiro!
            }
        });
    </script>
